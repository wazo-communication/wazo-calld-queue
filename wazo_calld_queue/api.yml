paths:
  /queues:
    get:
      summary: Get queues
      description: '**Required ACL:** `calld.queues.read`'
      tags:
      - queues
      responses:
        '200':
          description: The list of queues
          schema:
            $ref: '#/definitions/QueueList'
        '503':
          $ref: '#/responses/AnotherServiceUnavailable'
  /queues/{queue_name}:
    get:
      summary: Get queue status
      description: '**Required ACL:** `calld.queues.{queue_name}.read`'
      parameters:
        - $ref: '#/parameters/QueueName'
      tags:
      - queues
      responses:
        '200':
          description: The status of a queue
          schema:
            $ref: '#/definitions/Queue'
        '503':
          $ref: '#/responses/AnotherServiceUnavailable'
  /queues/{queue_name}/livestats:
    get:
      summary: Get queue live stats
      description: '**Required ACL:** `calld.queues.{queue_name}.livestats.read`'
      parameters:
        - $ref: '#/parameters/QueueName'
      tags:
      - queues
      responses:
        '200':
          description: The live stats of a queue
          schema:
            $ref: '#/definitions/QueueStats'
        '503':
          $ref: '#/responses/AnotherServiceUnavailable'
  /queues/agents_status:
    get:
      summary: Get agents statuses form a queue
      description: '**Required ACL:** `calld.queues.{queue_name}.agents_status.read`'
      tags:
      - queues
      responses:
        '200':
          description: The agents status of a queue
          schema:
            $ref: '#/definitions/QueueAgentsStatus'
        '503':
          $ref: '#/responses/AnotherServiceUnavailable'
  /queues/{queue_name}/add_member:
    put:
      summary: Add new member in queue
      description: '**Required ACL:** `calld.queues.{queue_name}.add_member.update`'
      parameters:
        - $ref: '#/parameters/QueueName'
        - $ref: '#/parameters/QueueAddMember'
      tags:
      - queues
      responses:
        '204':
          description: Member has been added to the queue
          schema:
            $ref: '#/definitions/QueueAddMember'
        '503':
          $ref: '#/responses/AnotherServiceUnavailable'
  /queues/{queue_name}/remove_member:
    put:
      summary: Remove existing member from queue
      description: '**Required ACL:** `calld.queues.{queue_name}.remove_member.update`'
      parameters:
        - $ref: '#/parameters/QueueName'
        - $ref: '#/parameters/QueueRemoveMember'
      tags:
      - queues
      responses:
        '204':
          description: Member has been removed from the queue
          schema:
            $ref: '#/definitions/QueueRemoveMember'
        '503':
          $ref: '#/responses/AnotherServiceUnavailable'
  /queues/{queue_name}/pause_member:
    put:
      summary: Pause/Unpause members in queue
      description: '**Required ACL:** `calld.queues.{queue_name}.pause_member.update`'
      parameters:
        - $ref: '#/parameters/QueueName'
        - $ref: '#/parameters/QueuePauseMember'
      tags:
      - queues
      responses:
        '204':
          description: Member has been removed from the queue
          schema:
            $ref: '#/definitions/QueuePauseMember'
        '503':
          $ref: '#/responses/AnotherServiceUnavailable'
  /queues/{queue_name}/connect:
    put:
      summary: Connect an agent to a queue (supervisor action)
      description: >-
        **Required ACL:** `calld.queues.{queue_name}.connect.update`


        Connect the targeted agent to the queue. The caller (token user) must be
        an agent that is itself a member of the target queue; otherwise the
        request is rejected. Delegated to `wazo-agentd`; the change is reflected
        through the existing `queue_agents_status` event (no dedicated event).
        Already-connected agents return `204` (idempotent).
      parameters:
        - $ref: '#/parameters/QueueName'
        - $ref: '#/parameters/QueueAgentAction'
      tags:
      - queues
      responses:
        '204':
          description: Agent has been connected to the queue
        '400':
          description: The targeted agent has no active session (must log in first)
        '403':
          description: The supervisor is not a member of this queue
        '404':
          description: No such agent or queue
        '503':
          $ref: '#/responses/AnotherServiceUnavailable'
  /queues/{queue_name}/disconnect:
    put:
      summary: Disconnect an agent from a queue (supervisor action)
      description: >-
        **Required ACL:** `calld.queues.{queue_name}.disconnect.update`


        Disconnect the targeted agent from the queue. The caller (token user)
        must be an agent that is itself a member of the target queue; otherwise
        the request is rejected. Delegated to `wazo-agentd`; the change is
        reflected through the existing `queue_agents_status` event (no dedicated
        event). Already-disconnected agents return `204` (idempotent).
      parameters:
        - $ref: '#/parameters/QueueName'
        - $ref: '#/parameters/QueueAgentAction'
      tags:
      - queues
      responses:
        '204':
          description: Agent has been disconnected from the queue
        '400':
          description: The targeted agent has no active session
        '403':
          description: The supervisor is not a member of this queue
        '404':
          description: No such agent or queue
        '503':
          $ref: '#/responses/AnotherServiceUnavailable'
  /queues/intercept/{queue_name}:
    post:
      summary: Intercept call in queue waiting list
      description: '**Required ACL:** `calld.queues.{queue_name}.intercept.create`'
      parameters:
        - $ref: '#/parameters/QueueName'
        - $ref: '#/parameters/Intercept'
      tags:
      - queues
      responses:
        '201':
          description: Call has been intercepted
        '503':
          $ref: '#/responses/AnotherServiceUnavailable'
definitions:
  Queue:
    type: object
    properties:
      id:
        description: Unique identifier of the queue
        type: string
  QueueList:
    type: object
    properties:
      items:
        $ref: '#/definitions/Queue'
  QueueStats:
    type: object
    properties:
      name:
        description: Name
        type: string
      count:
        description: Count
        type: integer
      received:
        description: Received
        type: integer
      abandonned:
        description: Abandonned
        type: integer
      answered:
        description: Answered
        type: integer
      awr:
        description: AWR
        type: integer
      waiting_calls:
        description: Waiting calls
        type: object
      updated_at:
        description: Updated at
        type: string
  QueueAgentsStatus:
    type: object
    properties:
      id:
        description: Unique identifier of the agent
        type: integer
      number:
        description: Agent number
        type: string
      fullname:
        description: Agent full name
        type: string
      queue:
        description: >-
          Representative queue (the first of `queues`). Kept for backward
          compatibility; prefer `queues` for multi-queue agents.
        type: string
      queues:
        description: >-
          Names of the queues the agent is **currently** a member of at
          runtime (logged in). Empty when the agent is logged off, even if it
          is a configured member — use `configured_queues` for the full roster.
        type: array
        items:
          type: string
      configured_queues:
        description: >-
          Names of every queue the agent is configured for in confd,
          **independent of login state**. Unlike `queues`, this stays populated
          while the agent is logged off, so a client can list the agent as a
          (disconnected) member of each queue. To render an agent's status in a
          given queue: present when the queue is also in `queues`, paused when
          in `paused_queues`, otherwise disconnected. Does not feed `is_logged`
          / `is_paused`.
        type: array
        items:
          type: string
      paused_queues:
        description: Names of the queues in which the agent is currently paused
        type: array
        items:
          type: string
      is_logged:
        description: Whether the agent is logged into at least one queue
        type: boolean
      is_paused:
        description: Whether the agent is paused in at least one queue
        type: boolean
      is_ringing:
        description: Whether the agent's device is currently ringing
        type: boolean
      is_talking:
        description: Whether the agent is currently on a call
        type: boolean
      is_offline:
        description: Whether the agent device is offline (websocket down)
        type: boolean
      interface:
        description: >-
          Asterisk state interface backing the agent's runtime membership
          (set when the agent joins a queue).
        type: string
      logged_at:
        description: Login time of the agent
        type: string
      paused_at:
        description: Time of the first active pause
        type: string
      talked_at:
        description: Start time of the agent's current call
        type: string
      talked_with_number:
        description: Phone number of the current caller
        type: string
      talked_with_name:
        description: Name of the current caller
        type: string
  QueueAddMember:
    type: object
    properties:
      interface:
        description: Interface
        type: string
      penalty:
        description: Penalty
        type: integer
      paused:
        description: Paused
        type: integer
      member_name:
        description: Member name
        type: string
      state_interface:
        description: Interface state
        type: string
  QueueRemoveMember:
    type: object
    properties:
      interface:
        description: Interface
        type: string
  QueuePauseMember:
    type: object
    properties:
      interface:
        description: Interface
        type: string
      paused:
        description: Paused
        type: integer
      reason:
        description: Paused reason
        type: string
  QueueAgentAction:
    type: object
    properties:
      agent_id:
        description: Identifier of the agent to connect/disconnect
        type: integer
        required: true
  InterceptCall:
    type: object
    properties:
      call_id:
        description: Channel to intercept
        type: string
        required: true
      destination:
        description: destination extension
        type: string
        required: true
parameters:
  QueueName:
    name: queue_name
    in: path
    description: Name of the queue
    required: true
    type: string
  QueueAddMember:
    name: body
    in: body
    description: Parameters of the queue member
    required: true
    schema:
      $ref: '#/definitions/QueueAddMember'
  QueueRemoveMember:
    name: body
    in: body
    description: Parameter of member interface
    required: true
    schema:
      $ref: '#/definitions/QueueRemoveMember'
  QueuePauseMember:
    name: body
    in: body
    description: Parameter of member to pause/unpause
    required: true
    schema:
      $ref: '#/definitions/QueuePauseMember'
  QueueAgentAction:
    name: body
    in: body
    description: The agent to connect/disconnect
    required: true
    schema:
      $ref: '#/definitions/QueueAgentAction'
  Intercept:
    name: body
    in: body
    description: Intercept call
    required: true
    schema:
      $ref: '#/definitions/InterceptCall'